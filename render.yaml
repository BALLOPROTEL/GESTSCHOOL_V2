services:
  - type: web
    name: gestschool-api
    runtime: node
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/v1/health/ready
    buildCommand: >
      corepack enable &&
      corepack prepare pnpm@10.24.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm render:build:api
    startCommand: >
      pnpm render:start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ISSUER
        value: gestschool
      - key: JWT_AUDIENCE
        value: gestschool-clients
      - key: PASSWORD_RESET_AUDIENCE
        value: gestschool-password-reset
      - key: JWT_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: PASSWORD_RESET_DEV_EXPOSE_TOKEN
        value: "false"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: DEFAULT_TENANT_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: DEV_BOOTSTRAP_USERS_ON_START
        value: "false"
      - key: DEV_BOOTSTRAP_PORTAL_USERS
        value: "false"
      - key: TIMETABLE_REQUIRE_CANONICAL_REFS
        value: "true"
      - key: NOTIFICATIONS_WORKER_ENABLED
        value: "false"
      - key: OUTBOX_WORKER_BATCH_SIZE
        value: "80"
      - key: OUTBOX_CLAIM_TTL_SECONDS
        value: "120"
      - key: OUTBOX_MAX_ATTEMPTS
        value: "6"
      - key: OUTBOX_RETRY_BASE_SECONDS
        value: "15"
      - key: NOTIFICATIONS_DISPATCH_CLAIM_TTL_SECONDS
        value: "120"
      - key: NOTIFY_EMAIL_PROVIDER
        value: MOCK
      - key: NOTIFY_SMS_PROVIDER
        value: MOCK
      - key: NOTIFICATION_WEBHOOK_SECRET
        generateValue: true
      - key: MONITORING_METRICS_TOKEN
        generateValue: true
      - key: FILE_STORAGE_DRIVER
        value: LOCAL
      - key: FILE_STORAGE_BASE_URL
        value: https://gestschool-c880.onrender.com/files
      - key: ANALYTICS_CACHE_TTL_SECONDS
        value: "45"
      - key: CORS_ORIGINS
        value: https://gestschool-api.vercel.app
      - key: SWAGGER_ENABLED
        value: "false"
  - type: worker
    name: gestschool-worker
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: >
      corepack enable &&
      corepack prepare pnpm@10.24.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm render:build:api
    startCommand: >
      pnpm render:start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DEFAULT_TENANT_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: DEV_BOOTSTRAP_USERS_ON_START
        value: "false"
      - key: DEV_BOOTSTRAP_PORTAL_USERS
        value: "false"
      - key: TIMETABLE_REQUIRE_CANONICAL_REFS
        value: "true"
      - key: NOTIFICATIONS_WORKER_ENABLED
        value: "true"
      - key: OUTBOX_WORKER_BATCH_SIZE
        value: "80"
      - key: OUTBOX_CLAIM_TTL_SECONDS
        value: "120"
      - key: OUTBOX_MAX_ATTEMPTS
        value: "6"
      - key: OUTBOX_RETRY_BASE_SECONDS
        value: "15"
      - key: NOTIFICATIONS_DISPATCH_CLAIM_TTL_SECONDS
        value: "120"
      - key: NOTIFY_EMAIL_PROVIDER
        value: MOCK
      - key: NOTIFY_SMS_PROVIDER
        value: MOCK
      - key: NOTIFICATION_WEBHOOK_SECRET
        generateValue: true
