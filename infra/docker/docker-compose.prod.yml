services:
  api:
    image: ghcr.io/gestschool/api:latest
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://gestschool:${POSTGRES_PASSWORD}@postgres:5432/gestschool
      REDIS_URL: redis://redis:6379
      NOTIFICATIONS_WORKER_ENABLED: "false"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        order: start-first

  worker:
    image: ghcr.io/gestschool/api:latest
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://gestschool:${POSTGRES_PASSWORD}@postgres:5432/gestschool
      REDIS_URL: redis://redis:6379
      NOTIFICATIONS_WORKER_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gestschool
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gestschool
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestschool -d gestschool"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
